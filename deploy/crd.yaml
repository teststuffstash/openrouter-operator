apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openrouterkeys.openrouter.teststuff.net
spec:
  group: openrouter.teststuff.net
  scope: Namespaced
  names:
    plural: openrouterkeys
    singular: openrouterkey
    kind: OpenRouterKey
    shortNames: [orkey]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Project, type: string, jsonPath: .spec.project }
        - { name: Budget, type: number, jsonPath: .spec.budgetUSD }
        - { name: Reset, type: string, jsonPath: .spec.resetInterval }
        - { name: Ephemeral, type: boolean, jsonPath: .spec.ephemeral }
        - { name: Expires, type: string, jsonPath: .spec.expiresAt }
        - { name: Guardrail, type: string, jsonPath: .spec.guardrail }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [project, budgetUSD]
              properties:
                project:
                  type: string
                  minLength: 1
                budgetUSD:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true # k8s CRDs use draft-4: a bool paired with `minimum`
                  description: Spend cap in USD per reset window.
                resetInterval:
                  type: string
                  enum: [daily, weekly, monthly]
                  default: weekly
                  description: >-
                    Budget reset cadence for a standing key. weekly by default — caps a runaway
                    agent's blast radius. Ignored when ephemeral=true (a session key has no reset).
                ephemeral:
                  type: boolean
                  default: false
                  description: >-
                    If true, mint a single-shot per-session key with a HARD budgetUSD cap and no
                    reset window — the real per-session breaker. Requires `session`.
                session:
                  type: string
                  description: >-
                    Unique session id (e.g. issue-42-round-1). Required when ephemeral; makes the
                    OpenRouter key + the target Secret unique per session.
                expiresAt:
                  type: string
                  format: date-time
                  description: >-
                    RFC3339 timestamp after which OpenRouter auto-expires the key. Set for ephemeral
                    session keys so they self-destruct even if the CR is never deleted.
                guardrail:
                  type: string
                  description: OpenRouter guardrail name to attach (e.g. only-free).
                secretName:
                  type: string
                  description: k8s Secret to write the minted key into. Defaults to <project>-openrouter.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
