# The OpenRouter MANAGEMENT (provisioning) key the operator uses to mint per-project runtime keys.
# Same Infisical key the Crossplane provider-terraform path reads (OPENROUTER_MANAGEMENT_KEY); ESO
# delivers it into this namespace too. Tier-0 secret — never in git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openrouter-management
  namespace: openrouter-operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: openrouter-management
  data:
    - secretKey: OPENROUTER_MANAGEMENT_KEY
      remoteRef:
        key: OPENROUTER_MANAGEMENT_KEY
