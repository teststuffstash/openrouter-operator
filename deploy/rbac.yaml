apiVersion: v1
kind: ServiceAccount
metadata:
  name: openrouter-operator
  namespace: openrouter-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openrouter-operator
rules:
  # the CRs it reconciles (+ status)
  - apiGroups: ["openrouter.teststuff.net"]
    resources: ["openrouterkeys", "openrouterkeys/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # write the minted key into the target namespace's Secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
  # kopf housekeeping
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openrouter-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openrouter-operator
subjects:
  - kind: ServiceAccount
    name: openrouter-operator
    namespace: openrouter-operator
